# ============================================================================
# agent-platform Frontend Implementation Roadmap
# ============================================================================
# React 18 + TypeScript + Ant Design 5.x + Vite + Zustand
# Dual Theme: Claude Warm Cream (light) + GitHub Dark (dark)
# Desktop-first, min-width 1280px
# ============================================================================

plan_id: frontend-roadmap
objective: |
  Implement a complete React + TypeScript + Ant Design 5.x frontend console
  for the agent-platform, with dual theme support (warm cream light + GitHub Dark),
  covering MVP (15 pages) and full roadmap (27 pages).

created_at: "2026-04-20"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  total_mvp_tasks: 32
  total_mvp_waves: 4
  wave_1_task_count: 8
  total_dependencies: 38
  estimated_files: 95
  risk_score: 4  # 1-10 scale

tldr: |
  4-wave MVP plan for agent-platform frontend. Wave 1 scaffolds infrastructure
  (Vite, theme, auth, layout, routing). Wave 2 delivers login + dashboard + agent pages.
  Wave 3 adds market + organization. Wave 4 adds billing + polish. Post-MVP roadmap
  covers builder editor, approvals, memory, budget, i18n.

open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "Ant Design 5.x theme token system doesn't cover all custom components"
      likelihood: low
      impact: medium
      mitigation: "Use CSS variables as escape hatch; override only via theme token or CSS var"
    - scenario: "Backend API response format drifts from api-protocol.md"
      likelihood: low
      impact: high
      mitigation: "Frontend axios interceptor validates response shape; TypeScript types enforce contract"
    - scenario: "JWT refresh race condition in concurrent requests"
      likelihood: medium
      impact: medium
      mitigation: "Implement request queue: hold concurrent requests during token refresh, replay after"
  assumptions:
    - "All backend APIs are production-ready (283+ tests passing)"
    - "Gateway runs on localhost:8000 during development"
    - "Browser target: Chrome/Edge (latest), no IE11"
    - "No SSR required; SPA only"
    - "i18n deferred to Phase 9; first phase Chinese only"

