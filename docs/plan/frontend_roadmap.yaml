post_mvp_roadmap:
  phase_5_builder_editor:
    title: "Phase 5: Builder Editor (Core Complex Page)"
    description: |
      The 8-section split editor for Agent configuration. This is the most
      complex page in the application, requiring:
      - Left panel: 8 collapsible sections (basic info, personality, model config,
        tools, skills, MCP, workspace, permissions)
      - Right panel: real-time preview
      - Auto-save + manual save dual mode
      - Markdown editor for system prompt with preview
      - Dynamic MCP config form based on transport type
      - Workspace preload with drag-and-drop reordering
      - Validation + publish flow
    estimated_tasks: 8
    estimated_effort: large
    pages:
      - "/builder - Agent config list page"
      - "/builder/new - Create new agent config"
      - "/builder/:id - 8-section editor"

  phase_6_approvals_memory:
    title: "Phase 6: Approvals + Memory Browser"
    description: |
      Approval management and memory asset browsing.
      - Pending approval list with approve/reject actions
      - Approval history with filters
      - Memory asset file tree browser
      - Asset search with keyword
      - Text file preview (.md, .json, .yaml, .txt)
    estimated_tasks: 4
    estimated_effort: medium
    pages:
      - "/approvals - Pending list"
      - "/approvals/history - History"
      - "/memory - Asset browser"
      - "/memory/search - Asset search"

  phase_7_budget_permissions:
    title: "Phase 7: Budget Management + Permission Config"
    description: |
      Admin-only pages for budget and permission management.
      - Budget threshold setting with alert rules
      - Permission definition CRUD
      - Role management with permission binding
    estimated_tasks: 2
    estimated_effort: medium
    pages:
      - "/billing/budget - Budget management (admin)"
      - "/permissions - Permission config (super admin)"

  phase_8_builder_advanced:
    title: "Phase 8: Preview, Version History, Import/Export"
    description: |
      Advanced builder features.
      - Preview dialog: sandbox conversation with agent config
      - Version history: list, view, rollback
      - Import/export: YAML/JSON formats
    estimated_tasks: 3
    estimated_effort: medium
    pages:
      - "/builder/:id/preview - Preview dialog"
      - "/builder/:id/versions - Version history"
      - "/builder/import - Import agent config"

  phase_9_polish_i18n:
    title: "Phase 9: i18n, Responsive Tweaks, PWA"
    description: |
      Internationalization and final polish.
      - Extract all Chinese strings to i18n keys
      - Add English translations (react-i18next)
      - Language switcher in header
      - Responsive layout adjustments for tablets
      - PWA manifest + service worker (optional)
      - Performance optimization (bundle analysis, lazy loading audit)
      - Accessibility audit (ARIA labels, keyboard navigation)
    estimated_tasks: 4
    estimated_effort: medium

