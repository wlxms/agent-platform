# ============================================================================
# IMPLEMENTATION SPECIFICATION
# ============================================================================

implementation_specification:
  code_structure: |
    Standard Vite + React SPA with feature-based folder structure.
    API layer in src/api/ with typed axios client. Zustand stores in src/store/.
    Theme system via Ant Design ConfigProvider token override + CSS variables.
    Route-based code splitting via React.lazy().

  affected_areas:
    - "agent-platform/frontend/ (entire new directory)"
    - "agent-platform/docs/plan/ (this plan file)"

  component_details:
    - component: "ThemeSystem"
      responsibility: "Dual theme management via Ant Design ConfigProvider tokens + CSS variables"
      interfaces:
        - "ThemeProvider component wrapping App"
        - "useTheme() hook returning { theme, toggleTheme, isDark }"
        - "lightTheme.ts / darkTheme.ts exporting Ant Design ThemeConfig objects"
    - component: "AuthSystem"
      responsibility: "JWT auth flow: login, token storage, auto-refresh, route guards"
      interfaces:
        - "authStore (Zustand): token, user, login(), logout(), refresh()"
        - "AuthGuard component for protected routes"
        - "RoleGuard component for role-based access"
    - component: "ApiLayer"
      responsibility: "Typed HTTP client with interceptors for auth, error handling, request ID"
      interfaces:
        - "apiClient (Axios instance) with request/response interceptors"
        - "Per-module API files: auth.ts, agents.ts, builder.ts, market.ts, billing.ts, org.ts, approvals.ts, memory.ts, tasks.ts"
    - component: "MainLayout"
      responsibility: "Sidebar navigation + top header bar + content area"
      interfaces:
        - "MainLayout component with <Outlet />"
        - "Sidebar with role-filtered menu items"
        - "Header with theme switch dropdown, user menu"

  dependencies:
    - component: "ThemeSystem"
      relationship: "Used by MainLayout (header theme switch), App.tsx (ThemeProvider wrapper)"
    - component: "AuthSystem"
      relationship: "Used by ApiLayer (token injection), Router (AuthGuard), MainLayout (user menu)"
    - component: "ApiLayer"
      relationship: "Used by all page components for data fetching"

  integration_points:
    - "Gateway at VITE_GATEWAY_URL (default http://localhost:8000)"
    - "All API calls via /api/v1/ prefix"
    - "WebSocket at ws://{GATEWAY_URL}/api/v1/agents/{id}/stream"

